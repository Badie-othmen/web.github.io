<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

textarea{
width:300px;
height:100px;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<h2>Admin Panel</h2>

<textarea id="post"></textarea><br><br>

<button onclick="addPost()">Publier</button>

<script>

function addPost(){

let text=document.getElementById("post").value;

let posts=JSON.parse(localStorage.getItem("posts")) || [];

posts.push(text);

localStorage.setItem("posts",JSON.stringify(posts));

alert("Post added");

}

</script>

</body>
</html>
