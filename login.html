<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<h2>Admin Login</h2>

<input id="user" placeholder="username"><br>
<input id="pass" type="password" placeholder="password"><br>

<button onclick="login()">Login</button>

<script>

function login(){

let u=document.getElementById("user").value;

let p=document.getElementById("pass").value;

if(u==="admin" && p==="admin123456"){

window.location="index.html";

}else{

alert("Wrong login");

}

}

</script>

</body>
</html>
